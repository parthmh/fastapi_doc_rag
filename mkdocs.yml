site_name: FastAPI RAG Documentation
site_description: Technical architecture, pipeline dataflows, and deployment guide for the FastAPI RAG service.
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Welcome: index.md
  - System Architecture: architecture.md
  - RAG Pipeline Dataflow: dataflow.md
  - Load Testing & Deployment: deployment.md
  - Concurrent Ingestion Design: concurrent_ingestion.md
  - Multiprocessing Pipeline Details: multiprocessing_pipeline.md
  - FashionCLIP Image Ingestion: fashion_clip_ingestion.md
